<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>DuoNotes Editor</title>
  </head>
  <style>
    body { margin: 0; padding: 0; }
    #root > div:nth-of-type(1) {
      position: absolute;
      height: 100%;
      overflow: auto;
      width: 100%;
      top: 0;
      bottom: 0;
    }
    /* `top`/`bottom` both non-auto (above) forces this element to stretch to
       its container's full height regardless of `height: unset` alone —
       `position: static` (or `top/bottom: auto`) is what actually lets it
       shrink to content, which dynamicHeight mode depends on. */
    #root > div.dynamic-height { height: unset; position: static; }
    #root div .ProseMirror { min-height: 100%; overflow: visible; }
    #root div.dynamic-height .ProseMirror { height: unset; }
    .ProseMirror:focus { outline: none; }
    .highlight-background { background-color: #e6e6ff; }
  </style>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
